<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena - CricClash AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="theme-color" content="#00C2FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <style>
        .quiz-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: #020408;
            background-image: 
                radial-gradient(circle at top right, rgba(0, 194, 255, 0.15), transparent),
                radial-gradient(circle at bottom left, rgba(0, 255, 153, 0.08), transparent);
            position: relative;
            overflow: hidden;
        }

        .quiz-page::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.03;
            pointer-events: none;
        }
        
        .quiz-container {
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .quiz-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .quiz-header p {
            color: #888;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 3rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #question {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 2.5rem;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .options-grid {
            display: grid;
            gap: 1.25rem;
        }

        .option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.9);
            text-align: left;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #00C2FF;
            color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.2);
        }

        .option:active {
            transform: scale(0.98);
        }

        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3rem;
            padding: 0 1rem;
        }

        .back-link {
            text-decoration: none;
            color: #666;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .back-link:hover {
            color: #fff;
            transform: translateX(-5px);
        }

        .xp-badge {
            background: rgba(0, 255, 153, 0.1);
            color: #00FF99;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            border: 1px solid rgba(0, 255, 153, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="theme-neutral">
    <div class="quiz-page">
        <div class="quiz-container">
            <div class="quiz-header">
                <h2>Daily CricClash Quiz</h2>
                <p>Test your IPL IQ and climb the leaderboard</p>
            </div>

            <div class="glass-card question-card">
                <div id="question">Loading the ultimate challenge...</div>
                
                <div class="options-grid">
                    <button class="option" data-option="A">Option A</button>
                    <button class="option" data-option="B">Option B</button>
                    <button class="option" data-option="C">Option C</button>
                    <button class="option" data-option="D">Option D</button>
                </div>
            </div>

            <div class="quiz-footer">
                <a href="index.html" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Arena
                </a>
                <div id="xpReward" class="xp-badge">+0 XP</div>
            </div>
        </div>
    </div>

    <script src="js/supabase.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/gamification.js" defer></script>
    <script src="js/engagement.js" defer></script>
    <script src="js/dm.js" defer></script>
    <script src="app.js" defer></script>
    <script src="js/quiz.js" defer></script>
</body>
</html>
