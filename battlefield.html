<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlefield - CricClash AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00C2FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="shortcut icon" href="images/logo.png" type="image/png">
    <style>
        /* Battlefield-specific layout */
        body { overflow: hidden; }

        .battlefield-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* === SCOREBOARD HEADER STRIPE === */
        .scoreboard-header {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 20, 40, 0.9));
            border-bottom: 1px solid rgba(0, 194, 255, 0.3);
            padding: 0.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .scoreboard-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 194, 255, 0.05), transparent);
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        .score-live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 900;
            color: #ff3366;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .pulsing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff3366;
            animation: pulse 1.5s infinite;
        }

        .score-team-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .score-team-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--theme-color, var(--primary-ai-blue));
            letter-spacing: 1px;
        }

        .score-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -2px;
            text-shadow: 0 0 15px var(--primary-ai-blue);
        }

        .score-vs {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            padding: 0 1rem;
        }

        .score-ticker-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary-ai-blue);
            flex: 1;
            text-align: center;
            text-transform: uppercase;
        }

        /* === MAIN APP HEADER (nav) === */
        .app-header {
            flex-shrink: 0;
        }

        /* === BATTLEFIELD CONTENT GRID === */
        .battlefield-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1rem;
            padding: 1rem;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* === LEFT PANEL === */
        .bf-left-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            padding-bottom: 5rem;
        }

        .panel-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.2rem;
        }

        .panel-section h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Prediction Buttons */
        .predict-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }
        .predict-btn {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .predict-btn:hover {
            border-color: var(--primary-ai-blue);
            background: rgba(0, 194, 255, 0.1);
            transform: scale(1.05);
        }

        /* Leaderboard mini */
        .lb-items { display: flex; flex-direction: column; gap: 8px; }
        .lb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
        }
        .lb-item img { width: 32px; height: 32px; border-radius: 8px; }
        .lb-rank { font-weight: 900; font-size: 0.85rem; color: var(--primary-ai-blue); min-width: 20px; }

        /* === CHAT SECTION === */
        .chat-wrapper {
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 20, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            min-height: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-left h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
        }

        .online-badge {
            background: rgba(0, 255, 153, 0.1);
            border: 1px solid rgba(0, 255, 153, 0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--secondary-neon);
            font-weight: 700;
        }

        .dm-open-btn {
            background: linear-gradient(135deg, var(--primary-ai-blue), #6A5CFF);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0, 194, 255, 0.3);
        }

        .dm-open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 194, 255, 0.5);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column-reverse;
            gap: 1.2rem;
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        #chatForm {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.3s;
        }

        #chatForm:focus-within {
            border-color: var(--primary-ai-blue);
            box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.1);
        }

        #chatInput {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        #chatInput::placeholder { color: rgba(255,255,255,0.3); }

        .attachment-btn {
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .attachment-btn:hover { color: var(--primary-ai-blue); }

        .btn-send {
            background: linear-gradient(135deg, var(--primary-ai-blue), #6A5CFF);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: white;
            flex-shrink: 0;
        }
        .btn-send:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0, 194, 255, 0.5);
        }
    </style>
</head>
<body class="theme-neutral">
<div class="battlefield-wrapper">

    <!-- === SCOREBOARD HEADER STRIPE === -->
    <div class="scoreboard-header">
        <div class="score-live-badge">
            <div class="pulsing-dot"></div>
            LIVE
        </div>
        <div class="score-team-block">
            <span class="score-team-name" id="teamTag1">RCB</span>
            <span class="score-value" id="liveScore1">0/0</span>
        </div>
        <span class="score-vs" id="matchTickerText">OVR 0.0 | Waiting for toss...</span>
        <div class="score-team-block">
            <span class="score-value" id="liveScore2">0/0</span>
            <span class="score-team-name" id="teamTag2">SRH</span>
        </div>
        <a href="index.html" style="font-size:0.8rem; color:var(--text-muted); text-decoration:none;">← Hub</a>
    </div>

    <!-- === MAIN NAV HEADER === -->
    <header class="app-header glass-panel" style="flex-shrink:0; margin: 0 1rem; border-radius:0 0 16px 16px;">
        <div class="header-logo" onclick="location.href='index.html'" style="cursor:pointer;">
            <svg viewBox="0 0 200 200" style="width:36px; height:36px;">
                <path d="M50 150L100 50L150 150H120L100 100L80 150H50Z" fill="url(#bg-nav)"/>
                <circle cx="100" cy="50" r="10" fill="var(--secondary-neon)"/>
                <defs>
                    <linearGradient id="bg-nav" x1="50" y1="50" x2="150" y2="150" gradientUnits="userSpaceOnUse">
                        <stop stop-color="var(--primary-ai-blue)"/>
                        <stop offset="1" stop-color="var(--secondary-neon)"/>
                    </linearGradient>
                </defs>
            </svg>
            <h2>CRICCLASH <span class="ai-text">AI</span></h2>
        </div>
        <div class="user-profile-nav">
            <div id="profileNavBtn" class="profile-nav-btn" title="View Profile">
                <div class="level-badge" id="navLevelBadge">Lvl 1</div>
                <img id="navAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest" alt="Avatar" class="nav-avatar">
            </div>
        </div>
    </header>

    <!-- === BATTLEFIELD CONTENT === -->
    <div class="battlefield-content">

        <!-- LEFT PANEL -->
        <aside class="bf-left-panel">
            <!-- Ball Prediction -->
            <div class="panel-section">
                <h3>🎯 Ball Prediction</h3>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1rem;">What's next ball?</p>
                <div class="predict-options">
                    <button class="predict-btn" data-outcome="Dot">Dot</button>
                    <button class="predict-btn" data-outcome="1">1 Run</button>
                    <button class="predict-btn" data-outcome="4">FOUR</button>
                    <button class="predict-btn" data-outcome="6">SIX</button>
                    <button class="predict-btn" data-outcome="Wicket">WICKET</button>
                    <button class="predict-btn" data-outcome="Wide">WIDE</button>
                </div>
            </div>

            <!-- Leaderboard -->
            <div class="panel-section">
                <h3>🏆 Top Roasters</h3>
                <div class="lb-items" id="leaderboardList">
                    <div style="color:var(--text-muted); font-size:0.85rem; text-align:center; padding:1rem;">Loading titans...</div>
                </div>
            </div>
        </aside>

        <!-- CHAT SECTION -->
        <section class="chat-wrapper">
            <div class="chat-header">
                <div class="chat-header-left">
                    <h3>⚔️ Battlefield Chat</h3>
                    <span class="online-badge">🟢 <span id="onlineCount">132</span> Live</span>
                </div>
                <button class="dm-open-btn" id="navDM" onclick="document.getElementById('dmModal') && document.getElementById('dmModal').classList.remove('hidden')">
                    💬 DMs
                </button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div style="text-align:center; color:var(--text-muted); padding: 2rem;">
                    Connecting to the arena...
                </div>
            </div>
            <div class="chat-input-area">
                <form id="chatForm">
                    <label for="chatImageInput" class="attachment-btn" title="Upload Image/GIF">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </label>
                    <input type="file" id="chatImageInput" accept="image/*,image/gif" style="display:none;">
                    <input type="text" id="chatInput" placeholder="Drop a hot take or a roast... 🔥" autocomplete="off">
                    <button type="submit" class="btn-send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </form>
            </div>
        </section>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav glass-panel">
        <a href="index.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Hub</span>
        </a>
        <a href="battlefield.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            <span>Battle</span>
        </a>
        <a href="quiz.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span>Quiz</span>
        </a>
        <a href="studio.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Studio</span>
        </a>
    </nav>
</div>

<script src="js/supabase.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/gamification.js" defer></script>
<script src="js/chat.js" defer></script>
<script src="js/engagement.js" defer></script>
<script src="js/dm.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
